spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

app:
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  cors:
    allowed-origins: ${FRONTEND_URL}

  # =========================
  # EMAIL BUSINESS CONFIG (Production)
  # =========================
  mail:
    from-address: ${MAIL_FROM_ADDRESS:pineappleecommerce.example@gmail.com}
    from-name: "Pineapple E-commerce"
    base-url: "https://yourdomain.com"          # Thay bằng domain thật tạm thời chưa
    support-email: "support@pineapple.vn"

  vnpay:
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    pay-url: ${VNP_URL}
    return-url: "https://yourdomain.com/api/v1/payments/vnpay-return"
    ipn-url: "https://yourdomain.com/api/v1/payments/vnpay-ipn"
    frontend-result-url: "https://yourdomain.com/payment/result"